<style>
body {
  margin: 0;
  font-family: 'Roboto', sans-serif;
  background: #fef6f6;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.navbar {
  font-family: "Mali";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: #0077b6;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 30px;
  z-index: 1000;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  box-sizing: border-box;
}
.navbar-left {
  display: flex;
  gap: 40px;
  flex: 1;
  justify-content: center;
}
.navbar-right {
  display: flex;
  align-items: center;
  gap: 15px;
}
#logoutBtn {
  background: #ff6b6b;
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: 0.3s;
  font-family: 'Mali', sans-serif;
  font-size: 14px;
}
#logoutBtn:hover {
  background: #ff5252;
  transform: scale(1.05);
}

.navbar a {
   background-color: #d94c6f;
  color: white;
  text-decoration: none;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 8px;
  transition: 0.2s;
  font-size: 16px;
}

.navbar a:hover {
  background: #005f87;
}

.desk_only {
  display: inline;
}

#nowPlaying { position:fixed; top:70px; left:0; width:100%; background:linear-gradient(135deg,#d94c6f,#0077b6); padding:12px 25px; z-index:999; display:none; align-items:center; gap:12px; box-shadow:0 2px 8px rgba(0,0,0,.2); color:#fff; box-sizing:border-box; }
#nowPlaying.active { display:flex; }
.visualizer { display:flex; gap:3px; align-items:flex-end; height:30px; flex-shrink:0; }
.visualizer span { width:4px; background:#fff; border-radius:2px; animation:wave 0.8s ease-in-out infinite; }
@keyframes wave { 0%, 100% { height:8px; } 50% { height:28px; } }
#nowPlayingTitle { flex:1; font-weight:600; font-size:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
.playControls { display:flex; gap:8px; flex-shrink:0; }
.playControls button { background:rgba(255,255,255,0.2); border:2px solid #fff; color:#fff; width:38px; height:38px; border-radius:50%; cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; transition:.2s; flex-shrink:0; }

@media (max-width: 768px) {
  .desk_only {
    display: none;
  }
  .navbar {
    padding: 15px 20px;
    gap: 20px;
  }
  .navbar-left {
    gap: 25px;
  }
  .navbar a {
    font-size: 18px;
    padding: 6px 10px;
  }
  #logoutBtn {
    padding: 6px 12px;
    font-size: 12px;
  }
}

header {
  background: #d94c6f;
  color: white;
  text-align: center;
  padding: 12px;
  margin-top: 135px;
  font-size: 24px;
  font-family: 'Great Vibes', cursive;
}

#lettersContainer {
  flex: 1;
  display: flex;
  height: calc(100vh - 50px);
  overflow: hidden;
  position: relative;
}

#lettersList {
  width: 250px;
  background: #fff8f0;
  border-right: 1px solid #eee;
  padding: 10px;
  overflow-y: auto;
  transition: transform 0.3s ease;
  background-color: pink;
}

.letterItem {
  padding: 10px;
  margin-bottom: 8px;
  background: white;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Great Vibes', cursive;
  font-size: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.letterItem:hover { background: #fce4ec; }

.letterDelete {
  color: red;
  font-weight: bold;
  cursor: pointer;
}

#editor {
  flex: 1;
  display: none;
  flex-direction: column;
  background: #fffaf7;
  padding: 20px;
  position: relative;
  box-sizing: border-box;
}

#editorContent {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#titleInput {
  font-family: 'Great Vibes', cursive;
  font-size: 28px;
  border: none;
  outline: none;
  margin-bottom: 10px;
  background: none;
  text-align: center;
  width: 100%;
}

#contentInput {
  flex: 1;
  border: none;
  outline: none;
  resize: none;
  background: none;
  font-size: 16px;
  line-height: 1.6;
  width: 100%;
}

#saveBtn {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: #d94c6f;
  color: white;
  border: none;
  padding: 12px 20px;
  cursor: pointer;
  border-radius: 8px;
  font-size: 16px;
  z-index: 5;
}

#closeBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #ff4d4d;
  border: none;
  color: white;
  width: 35px;
  height: 35px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 20px;
}

#addBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: #d94c6f;
  color: white;
  font-size: 30px;
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

@media(max-width:768px){
  #lettersContainer { flex-direction: column; }
  #lettersList {
    width: 100%;
    height: 150px;
    border-right: none;
    border-bottom: 1px solid #eee;
  }
  #editor { flex: 1; padding: 15px; }
  #lettersContainer.hideSidebar #lettersList { display: none !important; }
  #saveBtn { left: 10px; bottom:15px; padding: 10px 16px; font-size: 14px; }
  #closeBtn { top: 5px; right: 5px; width: 30px; height: 30px; font-size: 18px; }
}
</style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-left">
    <a href="notes.html"><i class="fas fa-sticky-note"></i><span class="desk_only">Notes</span></a>
    <a href="music.html"><i class="fas fa-music"></i><span class="desk_only">Music</span></a>
    <a href="gallery.html"><i class="fas fa-image"></i><span class="desk_only">Gallery</span></a>
    <a href="letters.html"><i class="fas fa-envelope-open-text"></i><span class="desk_only">Letters</span></a>
  </div>
  <div class="navbar-right">
    <button id="logoutBtn" title="Logout"><i class="fas fa-sign-out-alt"></i><span class="desk_only">Logout</span></button>
  </div>
</nav>

<div id="nowPlaying">
  <div class="visualizer">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div id="nowPlayingTitle">Nothing playing</div>
  <div class="playControls">
    <button id="playPauseBtn" title="Play/Pause"><i class="fas fa-play"></i></button>
  </div>
</div>
<header>My Letters 💌</header>

<div id="lettersContainer">
  <div id="lettersList"></div>
  <div id="editor">
    <button id="closeBtn">×</button>
    <div id="editorContent">
      <input type="text" id="titleInput" placeholder="Letter Title...">
      <textarea id="contentInput" placeholder="Write your letter here..."></textarea>
    </div>
    <button id="saveBtn">Save</button>
  </div>
</div>

<button id="addBtn">+</button>

<script type="module">
import { auth, supabase } from './supabase-integration.js';

const addBtn = document.getElementById("addBtn");
const lettersList = document.getElementById("lettersList");
const lettersContainer = document.getElementById("lettersContainer");
const editor = document.getElementById("editor");
const closeBtn = document.getElementById("closeBtn");
const saveBtn = document.getElementById("saveBtn");
const titleInput = document.getElementById("titleInput");
const contentInput = document.getElementById("contentInput");

let editingId = null;

const checkAuth = async () => {
  try {
    const user = await auth.getUser();
    if (!user) {
      window.location.href = 'index.html';
    } else {
      loadLetters();
    }
  } catch (e) {
    console.error('Auth error:', e);
    setTimeout(checkAuth, 500);
  }
};

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', checkAuth);
} else {
  checkAuth();
}

// Logout button handler
const logoutBtn = document.getElementById('logoutBtn');
logoutBtn?.addEventListener('click', async () => {
  try {
    await auth.logout();
    window.location.href = 'index.html';
  } catch (e) {
    console.error('Logout error:', e);
    alert('Logout failed: ' + e.message);
  }
});

async function loadLetters() {
  try {
    const user = await auth.getUser();
    const { data, error } = await supabase.from('letters')
      .select('*')
      .eq('user_id', user.id)
      .order('created_at', { ascending: false });
    
    if (error) throw error;

    lettersList.innerHTML = "";
    if (!data || data.length === 0) {
      lettersList.innerHTML = '<div style="padding:20px;color:#999;text-align:center;">No letters yet. Click + to write!</div>';
    } else {
      data.forEach(docData => {
        const div = document.createElement("div");
        div.className = "letterItem";

        const span = document.createElement("span");
        span.innerText = docData.title;
        span.style.flex = "1";
        span.addEventListener("click", () => openEditor(docData.id, docData));

        const del = document.createElement("span");
        del.innerText = "×";
        del.className = "letterDelete";
        del.addEventListener("click", async (e) => {
          e.stopPropagation();
          if (confirm("Delete this letter?")) {
            try {
              await supabase.from('letters').delete().eq('id', docData.id);
              loadLetters();
              if (editingId === docData.id) editor.style.display = "none";
            } catch (e) {
              console.error('Delete error:', e);
              alert('Delete failed: ' + e.message);
            }
          }
        });

        div.appendChild(span);
        div.appendChild(del);
        lettersList.appendChild(div);
      });
    }
  } catch (e) {
    console.error('Load error:', e);
    alert('Failed to load letters: ' + e.message);
  }
}

function openEditor(id = null, data = null) {
  editingId = id;
  editor.style.display = "flex";

  if(window.innerWidth <= 768){
    lettersContainer.classList.add("hideSidebar");
  }

  if (data) {
    titleInput.value = data.title;
    contentInput.value = data.content;
  } else {
    titleInput.value = "";
    contentInput.value = "";
  }
}

function closeEditor() {
  editor.style.display = "none";
  lettersContainer.classList.remove("hideSidebar");
}

saveBtn.addEventListener("click", async () => {
  const title = titleInput.value.trim();
  const content = contentInput.value.trim();
  if (!title || !content) {
    alert("Please fill in both title and content");
    return;
  }

  try {
    saveBtn.disabled = true;
    const user = await auth.getUser();
    if (editingId) {
      const { error } = await supabase.from('letters').update({ title, content }).eq('id', editingId);
      if (error) throw error;
    } else {
      const { error } = await supabase.from('letters').insert({
        user_id: user.id,
        title,
        content,
        created_at: new Date().toISOString()
      });
      if (error) throw error;
    }

    editor.style.display = "none";
    lettersContainer.classList.remove("hideSidebar");
    loadLetters();
  } catch (e) {
    console.error('Save error:', e);
    alert('Save failed: ' + e.message);
  } finally {
    saveBtn.disabled = false;
  }
});

addBtn.addEventListener("click", () => openEditor());
closeBtn.addEventListener("click", closeEditor);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker-optimized.js').catch(e => console.log('SW error:', e));
}
</script>
<script src="shared-music-player.js" defer></script>
</body>

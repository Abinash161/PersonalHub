<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAbancsm9ps84wLP8G5-PlqZ2qORswgtI4",
  authDomain: "forsm-95871.firebaseapp.com",
  projectId: "forsm-95871",
  storageBucket: "forsm-95871.appspot.com",
  messagingSenderId: "539969325228",
  appId: "1:539969325228:web:69b5ce6518841ad5f67709"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const addBtn = document.getElementById("addBtn");
const lettersList = document.getElementById("lettersList");
const lettersContainer = document.getElementById("lettersContainer");
const editor = document.getElementById("editor");
const closeBtn = document.getElementById("closeBtn");
const saveBtn = document.getElementById("saveBtn");
const titleInput = document.getElementById("titleInput");
const contentInput = document.getElementById("contentInput");

let editingId = null;

onAuthStateChanged(auth, user => {
  if (!user) window.location.href = "login.html";
  else loadLetters();
});

async function loadLetters() {
  lettersList.innerHTML = "";
  const snapshot = await getDocs(collection(db, "letters"));
  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    const div = document.createElement("div");
    div.className = "letterItem";

    const span = document.createElement("span");
    span.innerText = data.title;
    span.style.flex = "1";
    span.addEventListener("click", () => openEditor(docSnap.id, data));

    const del = document.createElement("span");
    del.innerText = "×";
    del.className = "letterDelete";
    del.addEventListener("click", async (e) => {
      e.stopPropagation();
      if (confirm("Delete this letter?")) {
        await deleteDoc(doc(db, "letters", docSnap.id));
        loadLetters();
        if (editingId === docSnap.id) editor.style.display = "none";
      }
    });

    div.appendChild(span);
    div.appendChild(del);
    lettersList.appendChild(div);
  });
}

function openEditor(id = null, data = null) {
  editingId = id;
  editor.style.display = "flex";

  if(window.innerWidth <= 768){
    lettersContainer.classList.add("hideSidebar");
  }

  if (data) {
    titleInput.value = data.title;
    contentInput.value = data.content;
  } else {
    titleInput.value = "";
    contentInput.value = "";
  }
}

function closeEditor() {
  editor.style.display = "none";
  lettersContainer.classList.remove("hideSidebar");
}

saveBtn.addEventListener("click", async () => {
  const title = titleInput.value.trim();
  const content = contentInput.value.trim();
  if (!title || !content) return alert("Please fill title and content");

  if (editingId) await updateDoc(doc(db, "letters", editingId), { title, content });
  else await addDoc(collection(db, "letters"), { title, content });

  editor.style.display = "none";
  lettersContainer.classList.remove("hideSidebar");
  loadLetters();
});

addBtn.addEventListener("click", () => openEditor());
closeBtn.addEventListener("click", closeEditor);

if ('serviceWorker' in navigator) {
  (async () => {
    try {
      const reg = await navigator.serviceWorker.register('service-workere5bf.js?v=12', { scope: '/', updateViaCache: 'none' });
      reg.addEventListener('updatefound', () => {
        const sw = reg.installing;
        if (!sw) return;
        sw.addEventListener('statechange', () => {
          if (sw.state === 'installed' && navigator.serviceWorker.controller) {
            sw.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
      navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
      document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') reg.update(); });
      // Optional: log SW version
      navigator.serviceWorker.addEventListener('message', e => { if (e.data?.type === 'VERSION') console.log('SW', e.data.version); });
      navigator.serviceWorker.controller?.postMessage({ type: 'GET_VERSION' });
    } catch (e) { console.log('SW registration failed:', e); }
  })();
}
</script>

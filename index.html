<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login — PersonalHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your personal digital sanctuary for notes, music, photos, and letters">
  <meta name="theme-color" content="#0077b6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PersonalHub">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Mali", sans-serif;
      background-color: pink;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #d6336c;
      padding: 20px 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
    }
    h2 { margin-bottom: 15px; color: #333; }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-family: inherit;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      background: #4CAF50;
      color: white;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
      font-family: inherit;
    }
    button:hover { background: #45a049; }
    button:disabled { background: #999; cursor: not-allowed; }
    .error { color: #ffecec; margin-top: 10px; font-size: 14px; }
    .success { color: #e8ffe8; margin-top: 10px; font-size: 14px; }
    .toggle-link { color: #fff; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="pageTitle">Login 💌</h2>
    <input type="email" id="email" placeholder="Email" autocomplete="email">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <button id="authBtn">Login</button>
    <p id="msg"></p>
    <p style="margin-top: 20px; font-size: 14px; color: #fff;">
      <span id="toggleText">Don't have an account? </span>
      <span class="toggle-link" id="toggleLink" onclick="toggleAuth()">Sign Up</span>
    </p>
  </div>

<script type="module">
// Auth uses ONLY the anon key — safe for frontend.
// Security is enforced server-side via Supabase RLS policies.
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://fvpedrabqhcpiifjcfik.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2cGVkcmFicWhjcGlpZmpjZmlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNTIwMzksImV4cCI6MjA5MDkyODAzOX0.VHTH80WcqX4B0q4G-q_kKAS4RHyDBVONEkRMFSTPTcc';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true }
});

const authBtn = document.getElementById('authBtn');
const msgDiv = document.getElementById('msg');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
let isSignup = false;

window.toggleAuth = () => {
  isSignup = !isSignup;
  authBtn.textContent = isSignup ? 'Sign Up' : 'Login';
  document.getElementById('pageTitle').textContent = isSignup ? 'Create Account 💌' : 'Login 💌';
  document.getElementById('toggleText').textContent = isSignup ? 'Already have an account? ' : "Don't have an account? ";
  document.getElementById('toggleLink').textContent = isSignup ? 'Login' : 'Sign Up';
  // Flip autocomplete hint
  passwordInput.autocomplete = isSignup ? 'new-password' : 'current-password';
  msgDiv.textContent = '';
  msgDiv.className = '';
};

authBtn.addEventListener('click', async () => {
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  msgDiv.textContent = '';
  msgDiv.className = '';

  if (!email || !password) {
    msgDiv.textContent = 'Please enter your email and password.';
    msgDiv.className = 'error';
    return;
  }

  // Basic length validation — strong passwords enforced server-side by Supabase
  if (password.length < 6) {
    msgDiv.textContent = 'Password must be at least 6 characters.';
    msgDiv.className = 'error';
    return;
  }

  authBtn.disabled = true;
  authBtn.textContent = isSignup ? 'Creating account...' : 'Logging in...';

  try {
    if (isSignup) {
      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: { emailRedirectTo: `${window.location.origin}/home.html` }
      });
      if (error) throw error;
      msgDiv.textContent = 'Check your email to confirm your account!';
      msgDiv.className = 'success';
    } else {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
      window.location.href = 'home.html';
    }
  } catch (error) {
    // Don't leak internal error details to the user
    const safeMessages = {
      'Invalid login credentials': 'Incorrect email or password.',
      'Email not confirmed': 'Please confirm your email before logging in.',
      'User already registered': 'An account with this email already exists.',
    };
    msgDiv.textContent = safeMessages[error.message] || 'Something went wrong. Please try again.';
    msgDiv.className = 'error';
    console.error('Auth error:', error.message);
  } finally {
    authBtn.disabled = false;
    authBtn.textContent = isSignup ? 'Sign Up' : 'Login';
  }
});

// Allow Enter key to submit
[emailInput, passwordInput].forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') authBtn.click(); });
});

// Redirect if already logged in
(async () => {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = 'home.html';
  } catch (e) {
    // Session check failed — stay on login page
  }

  supabase.auth.onAuthStateChange((event, session) => {
    if (session) window.location.href = 'home.html';
  });
})();
</script>

<script>
// Service Worker with reset mechanism
(async () => {
  if (!('serviceWorker' in navigator)) return;

  if (location.search.includes('reset-sw')) {
    const regs = await navigator.serviceWorker.getRegistrations();
    await Promise.all(regs.map(r => r.unregister()));
    const keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));
    const url = new URL(location.href);
    url.search = '';
    location.replace(url.toString());
    return;
  }

  const reg = await navigator.serviceWorker.register('service-worker-optimized.js', {
    scope: '/',
    updateViaCache: 'none'
  });

  reg.addEventListener('updatefound', () => {
    const sw = reg.installing;
    if (!sw) return;
    sw.addEventListener('statechange', () => {
      if (sw.state === 'installed' && navigator.serviceWorker.controller) {
        sw.postMessage({ type: 'SKIP_WAITING' });
      }
    });
  });

  navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') reg.update();
  });
})();

// PWA install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
});
window.installApp = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
};
</script>
</body>
</html>

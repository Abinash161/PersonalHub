<body>
  <div class="container">
    <h2 id="pageTitle">Login 💌</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <p id="msg"></p>
    <p style="text-align: center; margin-top: 20px; font-size: 14px;">
      <span id="toggleText">Don't have an account? </span>
      <a href="javascript:toggleAuth()" style="color: #007bff; cursor: pointer; text-decoration: none;">
        <span id="toggleLink">Sign Up</span>
      </a>
    </p>
  </div>


<script type="module">
// SUPABASE AUTHENTICATION (v2.0)
// Replace Firebase with Supabase for better real-time performance

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

// Supabase client initialization
const SUPABASE_URL = 'https://fvpedrabqhcpiifjcfik.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2cGVkcmFicWhjcGlpZmpjZmlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNTIwMzksImV4cCI6MjA5MDkyODAzOX0.VHTH80WcqX4B0q4G-q_kKAS4RHyDBVONEkRMFSTPTcc';

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const loginBtn = document.getElementById("loginBtn");
const msgDiv = document.getElementById("msg");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
let isSignup = false;

// Toggle login/signup mode
const toggleButton = () => {
  isSignup = !isSignup;
  loginBtn.textContent = isSignup ? 'Sign Up' : 'Login';
  document.querySelector('h2').innerHTML = isSignup ? 'Create Account 💌' : 'Login 💌';
  document.getElementById('toggleText').textContent = isSignup ? 'Already have an account? ' : 'Don\'t have an account? ';
  document.getElementById('toggleLink').textContent = isSignup ? 'Login' : 'Sign Up';
};

// Make it available globally for future UI enhancement
window.toggleAuth = toggleButton;

// Handle login/signup
loginBtn.addEventListener("click", async () => {
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  msgDiv.textContent = '';

  if (!email || !password) {
    msgDiv.textContent = 'Please enter email and password';
    msgDiv.className = 'error';
    return;
  }

  try {
    let result;
    if (isSignup) {
      // Sign up
      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: `${window.location.origin}/home.html`
        }
      });
      if (error) throw error;
      msgDiv.textContent = 'Check your email to confirm signup!';
      msgDiv.className = '';
    } else {
      // Login
      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });
      if (error) throw error;
      window.location.href = 'home.html';
    }
  } catch (error) {
    msgDiv.textContent = error.message || 'Authentication failed';
    msgDiv.className = 'error';
    console.error('Auth error:', error);
  }
});

// Check current session on page load
(async () => {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      window.location.href = 'home.html';
    } else {
      document.querySelector('.container').style.display = 'block';
    }
  } catch (e) {
    document.querySelector('.container').style.display = 'block';
  }

  // Listen for auth changes
  const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
    if (session) {
      window.location.href = 'home.html';
    }
  });

  // Cleanup on page unload
  window.addEventListener('beforeunload', () => {
    subscription?.unsubscribe();
  });
})();
</script>
<script>
// 1) One-time kill switch: visit /index.html?reset-sw to purge old SW and caches
(async () => {
  if (!('serviceWorker' in navigator)) return;
  if (location.search.includes('reset-sw')) {
    const regs = await navigator.serviceWorker.getRegistrations();
    await Promise.all(regs.map(r => r.unregister()));
    const keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));
    // remove query and reload clean
    const url = new URL(location.href); url.search = ''; location.replace(url.toString());
    return;
  }

  // 2) Register current SW (disable HTTP caching via query)
  const reg = await navigator.serviceWorker.register('service-worker-optimized.js', { scope: '/', updateViaCache: 'none' });

  // 3) Activate new worker immediately when found
  reg.addEventListener('updatefound', () => {
    const sw = reg.installing;
    if (!sw) return;
    sw.addEventListener('statechange', () => {
      if (sw.state === 'installed' && navigator.serviceWorker.controller) {
        sw.postMessage({ type: 'SKIP_WAITING' });
      }
    });
  });

  // 4) When controller changes, reload to use the new SW
  navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());

  // 5) Help the browser check for updates whenever the page becomes visible
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') reg.update();
  });

  // Optional: log SW version to verify on device
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'VERSION') console.log('SW version:', e.data.version);
  });
  navigator.serviceWorker.controller?.postMessage({ type: 'GET_VERSION' });
})();

// PWA Install Prompt
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  
  // Show install button/banner after login
  if (document.querySelector('.container').style.display !== 'none') {
    showInstallPrompt();
  }
});

function showInstallPrompt() {
  const installBanner = document.createElement('div');
  installBanner.id = 'installBanner';
  installBanner.innerHTML = `
    <div style="background: #0077b6; color: white; padding: 10px; text-align: center; position: fixed; top: 0; left: 0; right: 0; z-index: 1001; font-size: 14px;">
      <span>📱 Install PersonalHub for a better experience!</span>
      <button onclick="installApp()" style="margin-left: 10px; background: #d94c6f; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">Install</button>
      <button onclick="dismissInstallPrompt()" style="margin-left: 5px; background: transparent; color: white; border: 1px solid white; padding: 5px 10px; border-radius: 4px; cursor: pointer;">✕</button>
    </div>
  `;
  document.body.appendChild(installBanner);
}

window.installApp = async () => {
  if (!deferredPrompt) return;
  
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  
  if (outcome === 'accepted') {
    console.log('PWA installed successfully');
  }
  
  deferredPrompt = null;
  dismissInstallPrompt();
};

window.dismissInstallPrompt = () => {
  const banner = document.getElementById('installBanner');
  if (banner) banner.remove();
};

// Handle app installed event
window.addEventListener('appinstalled', () => {
  console.log('PersonalHub installed successfully!');
  dismissInstallPrompt();
});
</script>

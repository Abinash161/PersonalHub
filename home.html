<head>

  <title>Welcome My Love</title>
  <meta name="theme-color" content="#ff6b81">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="manifest" href="manifest.json">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;400;500;600&amp;family=Pacifico&amp;display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Mali", sans-serif;
      background: linear-gradient(135deg, #ffe6eb, #ffc2d1);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      position: relative;
    }

    /* Floating hearts animation */
    .hearts {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .hearts span {
      position: absolute;
      bottom: -20px;
      color: #ff6b81;
      font-size: 20px;
      animation: floatUp 6s linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-800px) scale(1.5);
        opacity: 0;
      }
    }

    .container {
      background: #fff;
      padding: 30px 20px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 360px;
      z-index: 1;
      position: relative;
      animation: popIn 0.8s ease;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .container:hover {
      transform: scale(1.02);
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    }

    @keyframes popIn {
      from {
        transform: scale(0.5);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    h1 {
      margin-bottom: 15px;
      color: #ff4d6d;
      font-family: "Pacifico", cursive;
      font-size: 28px;
    }

    .sticker {
      width: 100px;
      margin: 10px auto;
      display: block;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    a {
      display: block;
      margin: 12px 0;
      padding: 12px;
      background: #ff6b81;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 18px;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    a:hover {
      background: #e94e77;
      transform: translateX(5px);
    }

    a:active {
      transform: scale(0.98);
    }

    /* Responsive */
    @media (max-width: 420px) {
      .container {
        width: 90%;
        padding: 20px;
      }
      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <!-- Floating hearts -->
  <div class="hearts">
    <span style="left:10%">❤️</span>
    <span style="left:40%">💖</span>
    <span style="left:70%">💕</span>
    <span style="left:20%">💓</span>
    <span style="left:80%">💞</span>
  </div>

  <div class="container">

 <h1>Welcome, My Love ❤️</h1>

        <a href="letters.html">💌 Letter For You</a>

  </div>

  <script>
if ('serviceWorker' in navigator) {
  (async () => {
    try {
      const reg = await navigator.serviceWorker.register('service-workere5bf.js?v=12', { scope: '/', updateViaCache: 'none' });
      reg.addEventListener('updatefound', () => {
        const sw = reg.installing;
        if (!sw) return;
        sw.addEventListener('statechange', () => {
          if (sw.state === 'installed' && navigator.serviceWorker.controller) {
            sw.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
      navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
      document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') reg.update(); });
      // Optional: log SW version
      navigator.serviceWorker.addEventListener('message', e => { if (e.data?.type === 'VERSION') console.log('SW', e.data.version); });
      navigator.serviceWorker.controller?.postMessage({ type: 'GET_VERSION' });
    } catch (e) { console.log('SW registration failed:', e); }
  })();
}
</script>

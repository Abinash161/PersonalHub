    /* Editor */

    .save-btn {

    /* Add button */

      position: fixed;
      bottom: 20px;

      width: 50px;
      height: 50px;
      display: flex;

      justify-content: center;

    #closeBtn {
  position: absolute;

  background: #ff4d4d;

  border-radius: 50%;

}

    /* Responsive */
    @media(max-width:768px){
      .sidebar { width: 100%; position: absolute; left: 0; top: 70px; }
      .editor { width: 100%; height: 100%; position: absolute; top: 70px; left: 0; background: white; }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a href="notes.html"><i class="fas fa-sticky-note"></i><span class="desk_only">Notes</span></a>
    <a href="music.html"><i class="fas fa-music"></i><span class="desk_only">Music</span></a>
    <a href="gallery.html"><i class="fas fa-image"></i><span class="desk_only">Gallery</span></a>
    <a href="letters.html"><i class="fas fa-envelope-open-text"></i><span class="desk_only">Letters</span></a>
  </nav>

  <!-- Main container -->
  <div class="main-container">
    <div class="sidebar">
      <h2>Notes</h2>
      <div id="notesList"></div>
    </div>

    <div class="editor">
          <button id="closeBtn">×</button>
      <button class="save-btn">Save</button>
      <input class="title" id="noteTitle" placeholder="Note Title">
      <textarea id="noteContent" placeholder="Write your note here..."></textarea>
    </div>
  </div>

  <button class="add-btn"><i class="fas fa-plus"></i></button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyAbancsm9ps84wLP8G5-PlqZ2qORswgtI4",
      authDomain: "forsm-95871.firebaseapp.com",
      projectId: "forsm-95871",
      storageBucket: "forsm-95871.appspot.com",
      messagingSenderId: "539969325228",
      appId: "1:539969325228:web:69b5ce6518841ad5f67709"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    enableIndexedDbPersistence(db).catch(()=>{});
    const auth = getAuth(app);

    const notesList = document.getElementById("notesList");
    const editor = document.querySelector(".editor");
    const addBtn = document.querySelector(".add-btn");
    const saveBtn = document.querySelector(".save-btn");
    const noteTitle = document.getElementById("noteTitle");
    const noteContent = document.getElementById("noteContent");
    const closeBtn = document.getElementById("closeBtn");

    let currentNoteId = null;

    // Auth check
    onAuthStateChanged(auth, user => {
      if(!user) window.location.href = "index-2.html";
      else loadNotes();
    });

    // Add new note
    addBtn.addEventListener("click", () => {
      currentNoteId = null;
      noteTitle.value = "";
      noteContent.value = "";
      editor.style.display = "flex";
      if(window.innerWidth < 768) document.querySelector(".sidebar").style.display = "none";
    });

    // Fix: Hide editor and show sidebar on close
    closeBtn.addEventListener("click", () => {
      editor.style.display = "none";
      if(window.innerWidth < 768) document.querySelector(".sidebar").style.display = "block";
    });

    // Save note
    saveBtn.addEventListener("click", async () => {
      const title = noteTitle.value.trim();
      const content = noteContent.value.trim();
      if(!title && !content) return;

      if(currentNoteId){
        await updateDoc(doc(db, "notes", currentNoteId), { title, content });
      } else {
        await addDoc(collection(db, "notes"), { title, content });
      }
      editor.style.display = "none";
      if(window.innerWidth < 768) document.querySelector(".sidebar").style.display = "block";
      loadNotes();
    });

    // Load all notes
    async function loadNotes(){
      notesList.innerHTML = "";
      onSnapshot(collection(db, "notes"), (snap) => {
        notesList.innerHTML = "";
        snap.forEach(d => {
          const data = d.data();
          const div = document.createElement("div");
          div.className = "note-item";
          div.innerHTML = `
            <span>${data.title || "Untitled"}</span>
            <i class="fas fa-times" data-id="${d.id}"></i>
          `;
          div.addEventListener("click", e => {
            if(e.target.tagName === "I") return;
            currentNoteId = d.id;
            noteTitle.value = data.title || "";
            noteContent.value = data.content || "";
            editor.style.display = "flex";
            if(window.innerWidth < 768) document.querySelector(".sidebar").style.display = "none";
          });
          div.querySelector("i").addEventListener("click", async e => {
            await deleteDoc(doc(db, "notes", e.target.dataset.id));
          });
          notesList.appendChild(div);
        });
      });
    }
if ('serviceWorker' in navigator) {
  (async () => {
    try {
      const reg = await navigator.serviceWorker.register('service-workere5bf.js?v=12', { scope: '/', updateViaCache: 'none' });
      reg.addEventListener('updatefound', () => {
        const sw = reg.installing;
        if (!sw) return;
        sw.addEventListener('statechange', () => {
          if (sw.state === 'installed' && navigator.serviceWorker.controller) {
            sw.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
      navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
      document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') reg.update(); });
      // Optional: log SW version
      navigator.serviceWorker.addEventListener('message', e => { if (e.data?.type === 'VERSION') console.log('SW', e.data.version); });
      navigator.serviceWorker.controller?.postMessage({ type: 'GET_VERSION' });
    } catch (e) { console.log('SW registration failed:', e); }
  })();
}
  </script>

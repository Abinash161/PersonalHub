<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music</title>
<meta name="theme-color" content="#0077b6">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<!-- Aggressive preload for music continuity and performance -->
<link rel="preload" href="shared-music-player.js" as="script">
<link rel="preload" href="supabase-integration.js" as="script">
<link rel="prefetch" href="notes.html">
<link rel="prefetch" href="gallery.html">
<link rel="prefetch" href="letters.html">
<link rel="preconnect" href="https://fvpedrabqhcpiifjcfik.supabase.co">
<style>
body { font-family:'Poppins',sans-serif; padding-top:140px; background:pink; margin:0; }
.navbar { font-family:"Mali"; position:fixed; top:0; left:0; width:100%; background:#0077b6; display:flex; justify-content:space-between; align-items:center; padding:20px 30px; z-index:1000; box-shadow:0 2px 6px rgba(0,0,0,.1); box-sizing:border-box; }
.navbar-left { display:flex; gap:40px; flex:1; justify-content:center; }
.navbar-right { display:flex; align-items:center; gap:15px; }
#logoutBtn { background:#ff6b6b; color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:600; display:flex; align-items:center; gap:6px; transition:.3s; font-family:'Mali',sans-serif; font-size:14px; }
#logoutBtn:hover { background:#ff5252; transform:scale(1.05); }
.navbar a { background:#d94c6f; color:#fff; text-decoration:none; font-weight:500; display:flex; align-items:center; gap:6px; padding:5px 12px; border-radius:8px; font-size:16px; transition:.2s;}
.navbar a:hover { background:#005f87; }
.desk_only { display:inline; }
#nowPlaying { position:fixed; top:70px; left:0; width:100%; background:linear-gradient(135deg,#d94c6f,#0077b6); padding:12px 25px; z-index:999; display:none; align-items:center; gap:12px; box-shadow:0 2px 8px rgba(0,0,0,.2); color:#fff; box-sizing:border-box; }
#nowPlaying.active { display:flex; }
.visualizer { display:flex; gap:3px; align-items:flex-end; height:30px; flex-shrink:0; }
.visualizer span { width:4px; background:#fff; border-radius:2px; animation:wave 0.8s ease-in-out infinite; }
.visualizer span:nth-child(1) { animation-delay:0s; }
.visualizer span:nth-child(2) { animation-delay:0.1s; }
.visualizer span:nth-child(3) { animation-delay:0.2s; }
.visualizer span:nth-child(4) { animation-delay:0.3s; }
.visualizer span:nth-child(5) { animation-delay:0.4s; }
@keyframes wave { 0%, 100% { height:8px; } 50% { height:28px; } }
#nowPlayingTitle { flex:1; font-weight:600; font-size:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
.playControls { display:flex; gap:8px; flex-shrink:0; }
.playControls button { background:rgba(255,255,255,0.2); border:2px solid #fff; color:#fff; width:38px; height:38px; border-radius:50%; cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; transition:.2s; flex-shrink:0; }
.playControls button:hover { background:rgba(255,255,255,0.3); transform:scale(1.05); }
.playControls button:active { transform:scale(0.95); }
@media(max-width:768px){ 
  .desk_only{display:none;} 
  .navbar{
    padding:15px 20px;
    gap:20px;
  }
  .navbar-left{
    gap:25px;
  }
  .navbar a{font-size:18px;} 
  #logoutBtn{
    padding:6px 12px;
    font-size:12px;
  }
  body{padding-top:185px;} 
  #nowPlaying { padding:8px 15px; gap:8px; } 
  .visualizer { height:22px; gap:2px; } 
  .visualizer span { width:3px; } 
  @keyframes wave { 0%, 100% { height:6px; } 50% { height:20px; } } 
  #nowPlayingTitle { font-size:14px; } 
  .playControls { gap:6px; } 
  .playControls button { width:32px; height:32px; font-size:13px; border:1.5px solid #fff; } 
  #musicList { padding:10px 15px; gap:10px; } 
  #musicList div { padding:10px; padding-top:50px; } 
  #musicList strong { font-size:13px; } 
  .playTrackBtn { font-size:11px; padding:4px 8px; left:8px; top:8px; }
  .deleteBtn { font-size:10px; padding:3px 6px; }
  #addMusicBtn { width:50px; height:50px; font-size:25px; } 
}
#musicList { display:flex; flex-direction:column; gap:15px; padding:20px 40px; overflow-y:auto; overflow-x:hidden; min-height:200px; scrollbar-width:thin; }
#musicList div { background:#fff; padding:15px; border-radius:8px; display:flex; flex-direction:column; gap:6px; position:relative; width:100%; box-shadow:0 2px 8px rgba(0,0,0,.1); transition:.2s; padding-bottom:50px; }
#musicList div:hover { box-shadow:0 4px 12px rgba(0,0,0,.15); transform:translateY(-2px); }
#musicList strong { font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.playTrackBtn { position:absolute; top:8px; left:8px; background:#0077b6; color:#fff; border:none; border-radius:4px; cursor:pointer; padding:6px 10px; font-size:12px; transition:.2s; display:flex; align-items:center; gap:4px; }
.playTrackBtn:hover { background:#005087; }
.deleteBtn { position:absolute; top:8px; right:8px; background:red; color:#fff; border:none; border-radius:4px; cursor:pointer; padding:4px 8px; font-size:12px; transition:.2s; }
.deleteBtn:hover { background:darkred; }
#addMusicBtn { position:fixed; bottom:20px; right:20px; background:#d94c6f; color:#fff; border:none; border-radius:50%; width:60px; height:60px; font-size:30px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,.25);}
.hidden { display:none !important; }
.resumeBadge { position:absolute; top:5px; left:5px; background:#0077b6; color:#fff; font-size:11px; padding:2px 6px; border-radius:12px; }
</style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-left">
    <div style="display: flex; gap: 40px; flex: 1; justify-content: center;">
      <span onclick="window.location.href='notes.html'" style="cursor: pointer;"><i class="fas fa-sticky-note"></i><span class="desk_only">Notes</span></span>
      <span onclick="window.location.href='music.html'" style="cursor: pointer;"><i class="fas fa-music"></i><span class="desk_only">Music</span></span>
      <span onclick="window.location.href='gallery.html'" style="cursor: pointer;"><i class="fas fa-image"></i><span class="desk_only">Gallery</span></span>
      <span onclick="window.location.href='letters.html'" style="cursor: pointer;"><i class="fas fa-envelope-open-text"></i><span class="desk_only">Letters</span></span>
    </div>
  </div>
  <div class="navbar-right">
    <button id="logoutBtn" title="Logout"><i class="fas fa-sign-out-alt"></i><span class="desk_only">Logout</span></button>
  </div>
</nav>

<div id="nowPlaying">
  <div class="visualizer">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div id="nowPlayingTitle">Nothing playing</div>
  <div class="playControls">
    <button id="prevBtn" title="Previous"><i class="fas fa-backward"></i></button>
    <button id="playPauseBtn" title="Play/Pause"><i class="fas fa-play"></i></button>
    <button id="nextBtn" title="Next"><i class="fas fa-forward"></i></button>
  </div>
</div>

<h2 style="text-align:center;">My Music 🎵</h2>
<div id="musicList"></div>

<button id="addMusicBtn" title="Add music">+</button>
<input type="file" id="musicFile" accept="audio/*" multiple class="hidden" />

<script type="module">
import { auth, supabase } from './supabase-integration.js';

const nowPlaying = document.getElementById("nowPlaying");
const nowPlayingTitle = document.getElementById("nowPlayingTitle");
const prevBtn = document.getElementById("prevBtn");
const playPauseBtn = document.getElementById("playPauseBtn");
const nextBtn = document.getElementById("nextBtn");
const musicList = document.getElementById("musicList");
const addMusicBtn = document.getElementById("addMusicBtn");
const fileInput = document.getElementById("musicFile");

let currentAudio = null;

const LAST_TRACK_URL_KEY = "music_last_track_url";
const LAST_TIME_KEY = "music_last_track_time";

// Prevent page reload on navbar navigation
document.querySelectorAll('.navbar a').forEach(link => {
  link.addEventListener('click', (e) => {
    if (link.href.includes('.html')) {
      // Keep the browser's default link behavior but ensure music continues
      // The shared-music-player.js will handle persistence
    }
  });
});

// Auth check
const checkAuth = async () => {
  try {
    const user = await auth.getUser();
    if (!user) {
      console.log('No user, redirecting to login');
      window.location.href = 'index.html';
    } else {
      console.log('User authenticated:', user.email);
      loadMusicList();
    }
  } catch (e) {
    console.error('Auth check error:', e);
    setTimeout(checkAuth, 500);
  }
};

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', checkAuth);
} else {
  checkAuth();
}

// Logout button handler
const logoutBtn = document.getElementById('logoutBtn');
logoutBtn?.addEventListener('click', async () => {
  try {
    await auth.logout();
    window.location.href = 'index.html';
  } catch (e) {
    console.error('Logout error:', e);
    alert('Logout failed: ' + e.message);
  }
});

// Navigation controls
prevBtn.addEventListener("click", () => {
  // Trigger previous via localStorage - shared player will handle it
  const playlist = JSON.parse(localStorage.getItem('music_playlist') || '[]');
  const currentUrl = localStorage.getItem(LAST_TRACK_URL_KEY);
  const currentIndex = playlist.findIndex(t => currentUrl && currentUrl.includes(t.url));
  
  if (currentIndex > 0) {
    const prev = playlist[currentIndex - 1];
    localStorage.setItem(LAST_TRACK_URL_KEY, prev.url);
    localStorage.setItem('music_last_track_title', prev.title);
    localStorage.setItem('music_is_playing', 'true');
    localStorage.setItem(LAST_TIME_KEY, '0');
    localStorage.setItem('music_playlist_updated', String(Date.now()));
    
    if ('BroadcastChannel' in window) {
      const channel = new BroadcastChannel('music_sync');
      channel.postMessage({ type: 'STATE_UPDATE' });
    }
  }
});

playPauseBtn.addEventListener("click", () => {
  // Toggle play state via localStorage
  const isPlaying = localStorage.getItem('music_is_playing') === 'true';
  localStorage.setItem('music_is_playing', String(!isPlaying));
  localStorage.setItem('music_playlist_updated', String(Date.now()));
  
  if ('BroadcastChannel' in window) {
    const channel = new BroadcastChannel('music_sync');
    channel.postMessage({ type: 'STATE_UPDATE' });
  }
});

nextBtn.addEventListener("click", () => {
  // Trigger next via localStorage - shared player will handle it
  const playlist = JSON.parse(localStorage.getItem('music_playlist') || '[]');
  const currentUrl = localStorage.getItem(LAST_TRACK_URL_KEY);
  const currentIndex = playlist.findIndex(t => currentUrl && currentUrl.includes(t.url));
  
  if (currentIndex >= 0 && currentIndex < playlist.length - 1) {
    const next = playlist[currentIndex + 1];
    localStorage.setItem(LAST_TRACK_URL_KEY, next.url);
    localStorage.setItem('music_last_track_title', next.title);
    localStorage.setItem('music_is_playing', 'true');
    localStorage.setItem(LAST_TIME_KEY, '0');
    localStorage.setItem('music_playlist_updated', String(Date.now()));
    
    if ('BroadcastChannel' in window) {
      const channel = new BroadcastChannel('music_sync');
      channel.postMessage({ type: 'STATE_UPDATE' });
    }
  }
});

// File upload
addMusicBtn.addEventListener("click", () => fileInput.click());

// Add track to DOM - shows UI but NO independent playback
function addTrackToDom(track) {
  const wrap = document.createElement("div");
  wrap.innerHTML = `
    <strong>${track.title}</strong>
    <div style="display:flex; gap:6px; margin-top:8px;">
      <button class="playTrackBtn" data-url="${track.url}" data-title="${track.title}" title="Play"><i class="fas fa-play"></i> Play</button>
      <button class="deleteBtn">Delete</button>
    </div>
  `;
  
  // Play button - just updates localStorage, shared player handles actual playback
  const playBtn = wrap.querySelector(".playTrackBtn");
  playBtn.addEventListener("click", (e) => {
    e.preventDefault();
    localStorage.setItem('music_last_track_url', track.url);
    localStorage.setItem('music_last_track_title', track.title);
    localStorage.setItem('music_is_playing', 'true');
    localStorage.setItem('music_last_track_time', '0');
    localStorage.setItem('music_playlist_updated', String(Date.now()));
    
    // Broadcast to other pages and trigger shared player
    if ('BroadcastChannel' in window) {
      const channel = new BroadcastChannel('music_sync');
      channel.postMessage({
        type: 'STATE_UPDATE',
        url: track.url,
        title: track.title,
        isPlaying: true,
        currentTime: 0
      });
    }
  });

  // Delete button
  wrap.querySelector(".deleteBtn").addEventListener("click", async (e) => {
    e.preventDefault();
    if (confirm('Delete this track?')) {
      try {
        await supabase.from('music_tracks').delete().eq('id', track.id);
        console.log('✓ Track deleted');
        // Reload page to refresh the list
        location.reload();
      } catch (e) {
        console.error('Delete error:', e);
        alert('Delete failed: ' + e.message);
      }
    }
  });

  musicList.insertBefore(wrap, musicList.firstChild);
}

fileInput.addEventListener("change", async e => {
  const files = Array.from(e.target.files || []);
  if (!files.length) return;

  addMusicBtn.disabled = true;
  addMusicBtn.textContent = '⏳ ' + files.length;

  try {
    const user = await auth.getUser();
    
    if (!user || !user.id) {
      alert('User not authenticated. Please log in again.');
      window.location.href = 'index.html';
      return;
    }

    // Upload ALL files in PARALLEL - not sequential
    const uploadPromises = files.map(async (f) => {
      try {
        const title = f.name.replace(/\.[^.]+$/, "");
        console.log(`Uploading: ${title}`);
        
        // Upload file
        const path = `music_${Date.now()}_${Math.random().toString(36).substr(2, 5)}_${f.name}`;
        const { data: uploadData, error: uploadError } = await supabase.storage
          .from('music-files')
          .upload(path, f);
        
        if (uploadError) throw uploadError;

        // Store JUST the file path in database (not the public URL)
        // Signed URLs will be generated on-demand for better security
        const { data: insertData, error: dbError } = await supabase.from('music_tracks').insert({
          user_id: user.id,
          title,
          file_path: path,
          created_at: new Date().toISOString()
        }).select();
        
        if (dbError) {
          console.error('Database error details:', dbError);
          if (dbError.code === '23503') {
            throw new Error('Database error: User profile not found. Please contact support.');
          }
          throw dbError;
        }
        
        // Add to DOM immediately without reload
        if (insertData && insertData[0]) {
          addTrackToDom(insertData[0]);
        }
        
        console.log(`✓ Uploaded: ${title}`);
        return { success: true, title };
      } catch(err){ 
        console.error("Upload failed:", err);
        return { success: false, title: f.name, error: err.message };
      }
    });

    // Wait for ALL uploads to complete in parallel
    const results = await Promise.all(uploadPromises);
    
    // Show summary
    const succeeded = results.filter(r => r.success).length;
    const failed = results.filter(r => !r.success).length;
    
    if (failed > 0) {
      alert(`✓ ${succeeded} uploaded\n✗ ${failed} failed`);
    } else {
      console.log(`✓ All ${succeeded} files uploaded successfully!`);
    }
    
    // Reload page to refresh the list with fresh data
    if (succeeded > 0) {
      setTimeout(() => location.reload(), 500);
    }
  } catch(err) {
    console.error("Upload batch error:", err);
    alert(`Upload error: ${err.message}`);
  } finally {
    addMusicBtn.disabled = false;
    addMusicBtn.innerHTML = '<i class="fas fa-plus"></i>';
    fileInput.value = "";
  }
});

async function loadMusicList() {
  try {
    const user = await auth.getUser();
    if (!user) {
      window.location.href = 'index.html';
      return;
    }
    
    // Clear list before loading
    musicList.innerHTML = '';
    
    const { data, error } = await supabase.from('music_tracks')
      .select('*')
      .eq('user_id', user.id)
      .order('created_at', { ascending: false });
    
    if (error) throw error;
    
    if (!data || data.length === 0) {
      musicList.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">No music yet. Click + to upload!</div>';
      return;
    }
    
    // Generate signed URLs for each track (valid for 24 hours)
    const tracksWithUrls = await Promise.all(
      data.map(async (track) => {
        try {
          // Generate signed URL from file path
          const { data: signedData, error: signedError } = await supabase.storage
            .from('music-files')
            .createSignedUrl(track.file_path, 86400); // 24 hours
          
          if (signedError) {
            console.error(`Signed URL error for ${track.title}:`, signedError);
            return { ...track, url: null };
          }
          
          return { ...track, url: signedData.signedUrl };
        } catch (e) {
          console.error(`Failed to generate signed URL for ${track.title}:`, e);
          return { ...track, url: null };
        }
      })
    );
    
    // Pre-cache playlist for fast access on other pages
    const playlistForCache = tracksWithUrls
      .filter(t => t.url) // Only include tracks with valid signed URLs
      .map(t => ({
        title: t.title,
        url: t.url,
        id: t.id
      }));
    localStorage.setItem('music_playlist', JSON.stringify(playlistForCache));
    localStorage.setItem('music_playlist_updated', String(Date.now()));

    // Display each track with its signed URL
    for (const track of tracksWithUrls) {
      if (track.url) {
        addTrackToDom(track);
      } else {
        // Show error for tracks that failed to generate signed URL
        const wrap = document.createElement("div");
        wrap.innerHTML = `<strong style="color:#ccc;">${track.title}</strong> <span style="color:#999;">(Failed to load)</span>`;
        musicList.insertBefore(wrap, musicList.firstChild);
      }
      
      // Small delay to allow DOM to render before next fetch
      await new Promise(resolve => setTimeout(resolve, 50));
    }
    
    // Resume last track if any
    const lastUrl = localStorage.getItem(LAST_TRACK_URL_KEY);
    if (lastUrl) {
      const audioEls = Array.from(musicList.querySelectorAll("audio"));
      const target = audioEls.find(a => a.src === lastUrl);
      if (target) {
        currentAudio = target;
        const lastTime = parseFloat(localStorage.getItem(LAST_TIME_KEY) || "0");
        if (lastTime > 0) {
          target.addEventListener('loadedmetadata', () => {
            target.currentTime = Math.min(lastTime, target.duration);
          }, { once: true });
        }
        // Auto play if was playing before
        if (localStorage.getItem('music_is_playing') === 'true') {
          target.play().catch(()=>{});
        }
      }
    }
  } catch (e) {
    console.error('Load error:', e);
  }
}
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker-optimized.js').catch(e => console.log('SW error:', e));
}
</script>
<script src="shared-music-player.js" defer></script>
</body>
</html>

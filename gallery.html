<style>
body { font-family:'Poppins',sans-serif; background:pink; padding-top:130px; overflow-x: hidden; }

.navbar-right { display: flex; align-items: center; gap: 15px; }
#logoutBtn { background: #ff6b6b; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 6px; transition: 0.3s; font-family: 'Mali', sans-serif; font-size: 14px; }
#logoutBtn:hover { background: #ff5252; transform: scale(1.05); }
.navbar a { background: #d94c6f; color: white; text-decoration: none; font-weight: 500; display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 8px; transition: 0.2s; font-size: 16px;}
.navbar a:hover { background: #005f87; }
.desk_only { display: inline; }

.playControls button { background:rgba(255,255,255,0.2); border:2px solid #fff; color:#fff; width:38px; height:38px; border-radius:50%; cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; transition:.2s; flex-shrink:0; }
.playControls button:hover { background:rgba(255,255,255,0.3); transform:scale(1.05); }
.playControls button:active { transform:scale(0.95); }

  .desk_only { display: none; } 
  .navbar {

    gap: 20px;
  }
  .navbar-left {
    gap: 25px;
  }
  .navbar a { font-size: 18px; padding: 6px 10px; } 
  #logoutBtn {
    padding: 6px 12px;
    font-size: 12px;
  }
  body { padding-top:185px; }
  #nowPlaying { padding:8px 15px; gap:8px; }
  .visualizer { height:22px; gap:2px; }
  .visualizer span { width:3px; }
  @keyframes wave { 0%, 100% { height:6px; } 50% { height:20px; } }
  #nowPlayingTitle { font-size:14px; }
  .playControls { gap:6px; }
  .playControls button { width:32px; height:32px; font-size:13px; border:1.5px solid #fff; }
}
#foldersList { display: flex; flex-wrap: wrap; gap: 24px; padding: 20px; }
.folderItem { background: white; border-radius: 12px; width: 120px; height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.07); cursor: pointer; position: relative; }
.folderItem .folderIcon { font-size: 38px; color: #0077b6; }
.folderItem .folderName { margin-top: 8px; font-weight: 600; color: #d94c6f; text-align: center; font-size: 12px; }
.folderItem:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.13); }
#galleryList {
  position: relative;
  width: 100%;
  padding: 20px;
  padding-right: 0;
  padding-left: 0;
  
}

.galleryItem {
  position: absolute;
  width: 200px;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
  cursor: pointer;
}

.galleryItem:hover {
  box-shadow: 0 6px 16px rgba(0,0,0,0.15);
}

@media (max-width: 480px) {
  .galleryItem {
    width: 160px;
  }
}

.galleryItem img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s ease;
}

.crossBtn { position: absolute; top: 8px; right: 8px; background: red; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; font-size: 16px; line-height: 22px; text-align: center; cursor: pointer; z-index: 10; }
#createFolderBtn { position:fixed; bottom:90px; right:20px; background:#d94c6f; color:white; border:none; border-radius:50%; width:60px; height:60px; font-size:28px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,0.2);}
#cameraBtn { position:fixed; bottom:20px; right:20px; background:#0077b6; color:white; border:none; border-radius:50%; width:60px; height:60px; font-size:28px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,0.2);}
#backBtn { position:fixed; top:80px; left:20px; background:#d94c6f; color:white; border:none; border-radius:50%; width:50px; height:50px; font-size:22px; cursor:pointer; display:none; align-items:center; justify-content:center; z-index:1001; }
#folderPopup { position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.3); display:none; align-items:center; justify-content:center; z-index:2000; }
#popupContent { background:white; border-radius:16px; padding:32px 24px; box-shadow:0 8px 32px rgba(0,0,0,0.18); display:flex; flex-direction:column; align-items:center; gap:18px; min-width:280px; }
#popupContent input { font-size:18px; padding:8px 12px; border-radius:8px; border:1px solid #ccc; width:100%; }
#popupContent button { background:#0077b6; color:white; border:none; border-radius:8px; padding:8px 18px; font-size:18px; cursor:pointer; margin-top:10px; }
#popupContent .closePopup { background:#d94c6f; position:absolute; top:12px; right:18px; border-radius:50%; width:32px; height:32px; font-size:20px; border:none; color:white; cursor:pointer; }
#fullscreenOverlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.92); align-items: center; justify-content: center; z-index: 5000; }
#fullscreenImg { max-width: 98vw; max-height: 98vh; border-radius: 10px; object-fit: contain; }
#closeFullscreenBtn { position: absolute; top: 18px; right: 18px; background: #d94c6f; color: white; border: none; border-radius: 50%; width: 35px; height: 35px; font-size: 20px; cursor: pointer; z-index: 5001; }
#imageFile { display:none; }
</style>

<body>

<nav class="navbar">
  <div class="navbar-left">
    <div style="display: flex; gap: 40px; flex: 1; justify-content: center;">
      <span onclick="window.location.href='notes.html'" style="cursor: pointer;"><i class="fas fa-sticky-note"></i><span class="desk_only">Notes</span></span>
      <span onclick="window.location.href='music.html'" style="cursor: pointer;"><i class="fas fa-music"></i><span class="desk_only">Music</span></span>
      <span onclick="window.location.href='gallery.html'" style="cursor: pointer;"><i class="fas fa-image"></i><span class="desk_only">Gallery</span></span>
      <span onclick="window.location.href='letters.html'" style="cursor: pointer;"><i class="fas fa-envelope-open-text"></i><span class="desk_only">Letters</span></span>
    </div>
  </div>
  <div class="navbar-right">
    <button id="logoutBtn" title="Logout"><i class="fas fa-sign-out-alt"></i><span class="desk_only">Logout</span></button>
  </div>
</nav>

<div id="nowPlaying">
  <div class="visualizer"><span></span><span></span><span></span><span></span><span></span></div>
  <div id="nowPlayingTitle">Nothing playing</div>
  <div class="playControls">
    <button id="prevBtn" title="Previous"><i class="fas fa-backward"></i></button>
    <button id="playPauseBtn" title="Play/Pause"><i class="fas fa-play"></i></button>
    <button id="nextBtn" title="Next"><i class="fas fa-forward"></i></button>
  </div>
</div>

<h2 style="text-align:center;">My Gallery 🖼️</h2>
<div id="foldersList"></div>
<div id="galleryList" style="display:none"></div>
<button id="backBtn" title="Back"><i class="fas fa-arrow-left"></i></button>

<input type="file" id="imageFile" accept="image/*" multiple>
<button id="createFolderBtn" title="Create New Folder"><i class="fas fa-folder-plus"></i></button>
<button id="cameraBtn" title="Camera"><i class="fas fa-camera"></i></button>

<div id="folderPopup">
  <div id="popupContent">
    <button class="closePopup" type="button">&times;</button>
    <h3 style="margin:0;">Create New Folder</h3>
    <form id="folderForm" onsubmit="return false;">
      <input type="text" id="popupFolderName" placeholder="Folder Name">
      <button type="submit">Create</button>
    </form>
  </div>
</div>

<div id="fullscreenOverlay">
  <img id="fullscreenImg" />
  <button id="closeFullscreenBtn">&times;</button>
</div>

<script type="module">
import { auth, supabase } from './supabase-integration.js';

const foldersList = document.getElementById("foldersList");
const galleryList = document.getElementById("galleryList");
const backBtn = document.getElementById("backBtn");
const createFolderBtn = document.getElementById("createFolderBtn");
const cameraBtn = document.getElementById("cameraBtn");
const imageFile = document.getElementById("imageFile");
const folderPopup = document.getElementById("folderPopup");
const folderForm = document.getElementById("folderForm");
const fullscreenOverlay = document.getElementById("fullscreenOverlay");

let currentFolderId = null;

// Masonry layout function
function applyMasonry() {
  const container = galleryList;
  const items = Array.from(container.getElementsByClassName("galleryItem"));
  if (!items.length) return;

  const waitForImages = () => {
    return new Promise(resolve => {
      let tries = 0;
      const interval = setInterval(() => {
        const allLoaded = items.every(item => item.offsetHeight > 0);
        tries++;
        if (allLoaded || tries > 100) {
          clearInterval(interval);
          resolve();
        }
      }, 20);
    });
  };

  waitForImages().then(() => {
    const gap = 10;
    const minColumnWidth = galleryList.clientWidth < 500 ? 160 : 200;
    const columnCount = Math.max(1, Math.floor((galleryList.clientWidth + gap) / (minColumnWidth + gap)));
    const columnHeights = Array(columnCount).fill(0);
    
    // Distribute width evenly across columns to avoid gaps
    const availableWidth = galleryList.clientWidth;
    const actualColumnWidth = (availableWidth - (columnCount - 1) * gap) / columnCount;

    items.forEach(item => {
      const h = item.offsetHeight;
      const minCol = columnHeights.indexOf(Math.min(...columnHeights));
      const x = minCol * (actualColumnWidth + gap);
      const y = columnHeights[minCol];

      item.style.transform = `translate(${x}px, ${y}px)`;
      item.style.width = actualColumnWidth + "px";
      columnHeights[minCol] += h + gap;
    });

    galleryList.style.height = Math.max(...columnHeights) + 40 + "px";
  });
}

const checkAuth = async () => {
  try {
    const user = await auth.getUser();
    if (!user) {
      window.location.href = 'index.html';
    } else {
      console.log('User authenticated:', user.id);
      loadFolders();
    }
  } catch (e) {
    console.error('Auth error:', e);
    setTimeout(checkAuth, 500);
  }
};

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', checkAuth);
} else {
  checkAuth();
}

// Logout button handler
const logoutBtn = document.getElementById('logoutBtn');
logoutBtn?.addEventListener('click', async () => {
  try {
    await auth.logout();
    window.location.href = 'index.html';
  } catch (e) {
    console.error('Logout error:', e);
    alert('Logout failed: ' + e.message);
  }
});

async function loadFolders() {
  try {
    const user = await auth.getUser();
    const { data, error } = await supabase.from('gallery_folders')
      .select('*')
      .eq('user_id', user.id)
      .order('created_at', { ascending: false });
    
    if (error) throw error;
    
    foldersList.innerHTML = "";
    if (!data || data.length === 0) {
      foldersList.innerHTML = '<div style="width:100%;text-align:center;padding:40px;color:#999;">No folders. Click + to create one!</div>';
      return;
    }

    data.forEach(folder => {
      const folderDiv = document.createElement("div");
      folderDiv.className = "folderItem";
      folderDiv.innerHTML = `
        <div class="folderIcon"><i class="fas fa-folder"></i></div>
        <div class="folderName">${folder.name}</div>
      `;
      folderDiv.addEventListener("click", () => openFolder(folder.id));
      foldersList.appendChild(folderDiv);
    });
  } catch (e) {
    console.error('Load folders error:', e);
    alert('Failed to load folders: ' + e.message);
  }
}

async function openFolder(folderId) {
  currentFolderId = folderId;
  foldersList.style.display = "none";
  galleryList.style.display = "block";
  backBtn.style.display = "flex";
  
  try {
    const { data, error } = await supabase.from('gallery_images')
      .select('*')
      .eq('folder_id', folderId)
      .order('created_at', { ascending: false });
    
    if (error) throw error;
    
    galleryList.innerHTML = "";
    if (!data || data.length === 0) {
      galleryList.innerHTML = '<div style="width:100%;text-align:center;padding:40px;color:#999;">No images. Click + to upload!</div>';
    } else {
      data.forEach(image => {
        const imgDiv = document.createElement("div");
        imgDiv.className = "galleryItem";
        
        // Use cached URL if available, otherwise use direct URL
        const cachedUrl = localStorage.getItem(`img_cache_${image.url}`) || image.url;
        
        imgDiv.innerHTML = `
          <img src="${cachedUrl}" alt="${image.name}" loading="lazy" />
          <button class="crossBtn">×</button>
        `;
        imgDiv.querySelector("img").addEventListener("click", () => showFullscreen(cachedUrl));
        imgDiv.querySelector(".crossBtn").addEventListener("click", async (e) => {
          e.stopPropagation();
          if (confirm('Delete this image?')) {
            try {
              await supabase.from('gallery_images').delete().eq('id', image.id);
              location.reload();
            } catch (e) {
              console.error('Delete error:', e);
              alert('Delete failed: ' + e.message);
            }
          }
        });
        galleryList.appendChild(imgDiv);
      });
    }
    // Apply masonry layout after all images are appended
    applyMasonry();
  } catch (e) {
    console.error('Open folder error:', e);
    alert('Failed to load folder: ' + e.message);
  }
}

backBtn.addEventListener("click", () => {
  currentFolderId = null;
  galleryList.style.display = "none";
  foldersList.style.display = "flex";
  backBtn.style.display = "none";
  loadFolders();
});

createFolderBtn.addEventListener("click", () => {
  if (currentFolderId) {
    imageFile.click();
  } else {
    folderPopup.style.display = "flex";
  }
});

document.querySelector(".closePopup").addEventListener("click", () => {
  folderPopup.style.display = "none";
});

folderForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const folderName = document.getElementById("popupFolderName").value.trim();
  if (!folderName) {
    alert('Please enter a folder name');
    return;
  }
  
  try {
    createFolderBtn.disabled = true;
    const user = await auth.getUser();
    
    if (!user || !user.id) {
      alert('User not authenticated. Please log in again.');
      window.location.href = 'index.html';
      return;
    }
    
    console.log('Creating folder for user:', user.id);
    
    const { data, error } = await supabase.from('gallery_folders').insert({
      user_id: user.id,
      name: folderName,
      created_at: new Date().toISOString()
    });
    
    if (error) {
      console.error('Create folder error details:', error);
      if (error.code === '23503') {
        alert('Database error: User profile not found. Please contact support.');
      } else {
        alert('Create failed: ' + error.message);
      }
      return;
    }
    
    folderPopup.style.display = "none";
    document.getElementById("popupFolderName").value = "";
    location.reload();
  } catch (e) {
    console.error('Create folder error:', e);
    alert('Create failed: ' + e.message);
  } finally {
    createFolderBtn.disabled = false;
  }
});

// Image upload handler
imageFile.addEventListener("change", async (e) => {
  const files = Array.from(e.target.files || []);
  if (!files.length) return;
  
  createFolderBtn.disabled = true;
  createFolderBtn.textContent = '⏳';

  for (const file of files) {
    try {
      const path = `gallery_${Date.now()}_${Math.random().toString(36).substr(2, 5)}_${file.name}`;
      
      // Upload with cache headers for faster subsequent loads
      const { error: uploadError } = await supabase.storage
        .from('gallery-images')
        .upload(path, file, {
          cacheControl: '31536000', // Cache for 1 year
          upsert: false
        });
      
      if (uploadError) throw uploadError;
      
      // Get public URL and cache it locally for instant access
      const { data: { publicUrl } } = supabase.storage.from('gallery-images').getPublicUrl(path);
      localStorage.setItem(`img_cache_${path}`, publicUrl);
      
      const user = await auth.getUser();
      const { error: dbError } = await supabase.from('gallery_images').insert({
        folder_id: currentFolderId,
        user_id: user.id,
        name: file.name,
        url: publicUrl,
        created_at: new Date().toISOString()
      });
      
      if (dbError) throw dbError;
    } catch (e) {
      console.error('Upload error:', e);
      alert('Upload failed: ' + e.message);
    }
  }
  
  createFolderBtn.disabled = false;
  createFolderBtn.innerHTML = '<i class="fas fa-folder-plus"></i>';
  imageFile.value = "";
  openFolder(currentFolderId);
});

cameraBtn.addEventListener("click", () => {
  if (currentFolderId) {
    openCamera(currentFolderId);
  } else {
    alert('Please open a folder first');
  }
});

function showFullscreen(url) {
  document.getElementById("fullscreenImg").src = url;
  fullscreenOverlay.style.display = "flex";
}

document.getElementById("closeFullscreenBtn").addEventListener("click", () => {
  fullscreenOverlay.style.display = "none";
});

async function openCamera(folderId) {
  try {
    const video = document.createElement("video");
    const canvas = document.createElement("canvas");
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    video.play();
    
    const modal = document.createElement("div");
    modal.style.cssText = "position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;z-index:5000;display:flex;align-items:center;justify-content:center;flex-direction:column;";
    modal.appendChild(video);
    
    const captureBtn = document.createElement("button");
    captureBtn.textContent = "📷 Capture";
    captureBtn.style.cssText = "position:absolute;bottom:20px;background:#0077b6;color:white;padding:10px 20px;border:none;border-radius:4px;cursor:pointer;font-size:16px;";
    modal.appendChild(captureBtn);
    
    document.body.appendChild(modal);
    
    captureBtn.addEventListener("click", async () => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);
      stream.getTracks().forEach(t => t.stop());
      modal.remove();
      
      canvas.toBlob(async (blob) => {
        try {
          const path = `gallery_${Date.now()}_${Math.random().toString(36).substr(2, 5)}_camera.jpg`;
          const { error } = await supabase.storage.from('gallery-images').upload(path, blob, {
            cacheControl: '31536000'
          });
          if (error) throw error;
          
          const { data: { publicUrl } } = supabase.storage.from('gallery-images').getPublicUrl(path);
          localStorage.setItem(`img_cache_${path}`, publicUrl);
          const user = await auth.getUser();
          
          const { error: dbError } = await supabase.from('gallery_images').insert({
            folder_id: folderId,
            user_id: user.id,
            name: 'camera.jpg',
            url: publicUrl,
            created_at: new Date().toISOString()
          });
          
          if (dbError) throw dbError;
          openFolder(folderId);
        } catch (e) {
          console.error('Camera upload error:', e);
          alert('Camera upload failed: ' + e.message);
        }
      });
    });
  } catch (e) {
    console.error('Camera error:', e);
    alert('Camera error: ' + e.message);
  }
}

// Recalculate masonry on window resize and orientation change
window.addEventListener("resize", applyMasonry);
window.addEventListener("orientationchange", applyMasonry);

// Watch for dynamic changes
const observer = new MutationObserver(() => {
  if (galleryList.style.display !== "none") applyMasonry();
});
observer.observe(galleryList, { childList: true, subtree: true });

</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker-optimized.js').catch(e => console.log('SW error:', e));
}
</script>

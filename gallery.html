<script type="module">

let currentImages = [];
let currentIndex = 0;


// Ensure default "Camera" folder exists
async function ensureCameraFolder() {
  const snap = await getDocs(collection(db, "galleryFolders"));
  let found = false;
  snap.forEach(doc => {
    if (doc.id === "camera") found = true;
  });
  if (!found) {
    await setDoc(doc(db, "galleryFolders", "camera"), { name: "Camera" });
  }
}

// Show attractive folder menu
function showFolderMenu(folderId, folderName, parentDiv) {
  document.querySelectorAll(".folderMenuPopup").forEach(el => el.remove());
  const menu = document.createElement("div");
  menu.className = "folderMenuPopup";
  menu.innerHTML = `
    <button class="renameBtn"><i class="fas fa-edit"></i> Rename</button>
    <button class="deleteBtn"><i class="fas fa-trash"></i> Delete</button>
  `;
  menu.querySelector(".renameBtn").onclick = () => {
    renamePopup.style.display = "flex";
    renameFolderName.value = folderName;
    menu.remove();
    renamePopup.dataset.folderId = folderId;
  };
  menu.querySelector(".deleteBtn").onclick = async () => {
    if (confirm("Delete this folder and all its images?")) {
      await deleteDoc(doc(db, "galleryFolders", folderId));
      const snap = await getDocs(collection(db, "galleryImages"));
      snap.forEach(docSnap => {
        if (docSnap.data().folder === folderId) deleteDoc(doc(db, "galleryImages", docSnap.id));
      });
      loadFolders();
    }
    menu.remove();
  };
  parentDiv.appendChild(menu);
  document.addEventListener("click", function handler(e) {
    if (!menu.contains(e.target)) {
      menu.remove();
      document.removeEventListener("click", handler);
    }
  });
}

// Rename popup logic
closeRenamePopup.onclick = () => {
  renamePopup.style.display = "none";
};
renameFolderBtn.onclick = async () => {
  const folderId = renamePopup.dataset.folderId;
  const newName = renameFolderName.value.trim();
  if (newName) {
    await setDoc(doc(db, "galleryFolders", folderId), { name: newName });
    loadFolders();

// Show popup for folder creation

// Add image from "+" icon
function addImageFromDevice() {
  imageFile.value = "";

}

imageFile.addEventListener("change", async () => {
  if (!activeFolder) return;
  const files = imageFile.files;
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    try {
      const url = await uploadToCloudinary(file);
      await addDoc(collection(db, "galleryImages"), { url, folder: activeFolder });
    } catch (err) {
      alert("Upload failed: " + err.message);
    }
  }
  imageFile.value = "";

});

// ----------------------- FOLDERS & GALLERY -----------------------
async function loadFolders() {
  foldersList.innerHTML = "";
  const snap = await getDocs(collection(db, "galleryFolders"));
  folders = [];
  snap.forEach(docSnap => {
    const data = docSnap.data();
    folders.push({ id: docSnap.id, name: data.name });
  });

  folders.forEach(folder => {
    const div = document.createElement("div");
    div.className = "folderItem" + (activeFolder === folder.id ? " active" : "");
    div.innerHTML = `
      <span class="folderIcon"><i class="fas fa-folder"></i></span>
      <span class="folderName">${folder.name}</span>
      <button class="folderMenuBtn" style="position:absolute;top:8px;left:8px;background:none;border:none;font-size:20px;cursor:pointer;"><i class="fas fa-ellipsis-v"></i></button>
      ${activeFolder === folder.id ? `<button class="addImgBtn" title="Add Image" style="position:absolute;bottom:8px;right:8px;background:#0077b6;color:white;border:none;border-radius:50%;width:32px;height:32px;font-size:20px;cursor:pointer;"><i class="fas fa-plus"></i></button>` : ""}
    `;
    div.querySelector(".folderMenuBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      showFolderMenu(folder.id, folder.name, div);
    });
    if (div.querySelector(".addImgBtn")) {
      div.querySelector(".addImgBtn").addEventListener("click", addImageFromDevice);
    }
    div.addEventListener("click", e => {
      if (e.target.classList.contains("folderMenuBtn") || e.target.closest(".folderMenuBtn")) return;
      activeFolder = folder.id;
      showGallery(); // show images
      loadFolders(); // refresh folders
      backBtn.style.display = "flex";
    });
    foldersList.appendChild(div);
  });

  // Display logic
  foldersList.style.display = activeFolder ? "none" : "flex";
  galleryList.style.display = activeFolder ? "block" : "none";
  cameraBtn.style.display = activeFolder ? "flex" : "none";
  backBtn.style.display = activeFolder ? "flex" : "none";
  addImageFloatingBtn.style.display = activeFolder ? "block" : "none";
  createFolderBtn.style.display = activeFolder ? "none" : "flex";
}

// ----------------------- FOLDERS & GALLERY -----------------------
async function showGallery() {
  galleryList.innerHTML = "";
  currentImages = [];
  if (!activeFolder) return;

  const snap = await getDocs(collection(db, "galleryImages"));
  snap.forEach(docSnap => {
    const data = docSnap.data();
    if (data.folder === activeFolder) {
      currentImages.push({ url: data.url, id: docSnap.id });

      const div = document.createElement("div");
      div.className = "galleryItem";
      div.innerHTML = `
        <img src="${data.url}" alt="Gallery Image">
        <button class="crossBtn">×</button>
      `;

      // Delete button
      div.querySelector(".crossBtn").addEventListener("click", async () => {
        await deleteDoc(doc(db, "galleryImages", docSnap.id));
        showGallery();
      });

      // Fullscreen
      div.querySelector("img").addEventListener("click", () => {
        currentIndex = currentImages.findIndex(imgObj => imgObj.url === data.url);
        showFullscreenImage();
      });

      galleryList.appendChild(div);
    }
  });

  // Apply masonry layout after all images have **real rendered heights**
  applyMasonry();
}

// ----------------------- MASONRY LAYOUT -----------------------
function applyMasonry() {
  const container = galleryList;
  const items = Array.from(container.getElementsByClassName("galleryItem"));
  if (!items.length) return;

  const waitForImages = () => {
    return new Promise(resolve => {
      let tries = 0;
      const interval = setInterval(() => {
        const allLoaded = items.every(item => item.offsetHeight > 0);
        tries++;
        if (allLoaded || tries > 100) {
          clearInterval(interval);
          resolve();
        }
      }, 20);
    });
  };

  waitForImages().then(() => {
    const containerWidth = container.clientWidth;
    const gap = 10;

    // Responsive min column width: 200 for desktop, 140 for mobile
    const minColumnWidth = containerWidth < 500 ? 160 : 200;
    const columnCount = Math.max(1, Math.floor(containerWidth / (minColumnWidth + gap)));
    const columnHeights = Array(columnCount).fill(0);

    items.forEach(item => {
      const h = item.offsetHeight;
      const minCol = columnHeights.indexOf(Math.min(...columnHeights));
      const x = minCol * (minColumnWidth + gap);
      const y = columnHeights[minCol];

      item.style.position = "absolute";
      item.style.transform = `translate(${x}px, ${y}px)`;
      item.style.width = minColumnWidth + "px";

      columnHeights[minCol] += h + gap;
    });

    container.style.height = Math.max(...columnHeights) + "px";
  });
}

// ----------------------- WATCH DYNAMIC CHANGES -----------------------
const observer = new MutationObserver(() => applyMasonry());
observer.observe(galleryList, { childList: true, subtree: true });

// ----------------------- HANDLE RESIZE & ORIENTATION -----------------------
window.addEventListener("resize", applyMasonry);
window.addEventListener("orientationchange", applyMasonry);


function showFullscreenImage() {
  fullscreenImg.src = currentImages[currentIndex];
  fullscreenOverlay.style.display = "flex";
}


// Drag and drop support inside gallery
galleryList.addEventListener("dragover", e => {
  e.preventDefault();
  galleryList.style.background = "#ffe0e0";
});
galleryList.addEventListener("dragleave", e => {
  galleryList.style.background = "";
});
galleryList.addEventListener("drop", async e => {
  e.preventDefault();
  galleryList.style.background = "";
  if (!activeFolder) return;
  const files = e.dataTransfer.files;
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const url = await uploadToCloudinary(file);
    await addDoc(collection(db, "galleryImages"), { url, folder: activeFolder });
  }
  showGallery();
});

async function hasMultipleCameras() {
  const devices = await navigator.mediaDevices.enumerateDevices();
  return devices.filter(d => d.kind === "videoinput").length > 1;
}

cameraBtn.addEventListener("click", async () => {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    alert("Camera not supported on this device/browser.");
    return;
  }

  let usingFront = true;
  let stream = null;
  let videoEl = null;
  let camPopup = null;

  async function startCamera() {
    if (stream) stream.getTracks().forEach(track => track.stop());

    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: usingFront ? "user" : "environment"
      }
    });

    videoEl.srcObject = stream;
    videoEl.style.transform = usingFront ? "scaleX(-1)" : "scaleX(1)";
    await videoEl.play();
  }

  function stopCamera() {
    if (stream) stream.getTracks().forEach(track => track.stop());
    if (camPopup && document.body.contains(camPopup)) document.body.removeChild(camPopup);
  }

  function getOrientation() {
    if (window.screen.orientation) return window.screen.orientation.angle || 0;
    if (window.orientation !== undefined) return window.orientation;
    return 0;
  }

  // Build popup
  camPopup = document.createElement("div");
  camPopup.style.cssText = `
    position: fixed; top:0; left:0; width:100vw; height:100vh;
    background: rgba(0,0,0,0.7); display:flex; align-items:center;
    justify-content:center; z-index:3000;
  `;
  camPopup.innerHTML = `
    <div class="camera-modal">
      <video id="camPopupVideo" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover;"></video>
      <div class="camera-controls">
        <button id="captureBtn"><i class="fas fa-camera"></i></button>
        <button id="switchCamBtn"><i class="fas fa-sync-alt"></i></button>
        <button id="closeCamBtn"><i class="fas fa-times"></i></button>
      </div>
    </div>
  `;
  document.body.appendChild(camPopup);

  videoEl = camPopup.querySelector("#camPopupVideo");

  // Show switch only if multiple cameras
  const switchBtn = camPopup.querySelector("#switchCamBtn");
  const devices = await navigator.mediaDevices.enumerateDevices();
  if (devices.filter(d => d.kind === "videoinput").length <= 1) switchBtn.style.display = "none";

  await startCamera();

  // Capture button
  camPopup.querySelector("#captureBtn").onclick = async () => {
    // Use the video’s NATURAL resolution so the saved image matches all others
    const vw = videoEl.videoWidth || videoEl.clientWidth;
    const vh = videoEl.videoHeight || videoEl.clientHeight;

    // 1) Draw the current frame into a temp canvas and un-mirror if front camera
    const temp = document.createElement("canvas");
    temp.width = vw;
    temp.height = vh;
    const tctx = temp.getContext("2d");
    if (usingFront) {
      tctx.translate(vw, 0);
      tctx.scale(-1, 1); // un-mirror selfie
    }
    tctx.drawImage(videoEl, 0, 0, vw, vh);

    // 2) Rotate based on device orientation so the final image is upright
    const angle = getOrientation();
    const final = document.createElement("canvas");
    let outW = vw, outH = vh;
    if (angle === 90 || angle === -270 || angle === 270 || angle === -90) {
      outW = vh; outH = vw;
    }
    final.width = outW;
    final.height = outH;

    const fctx = final.getContext("2d");
    if (angle === 90 || angle === -270) {
      fctx.translate(outW, 0);
      fctx.rotate(Math.PI / 2);
    } else if (angle === 180 || angle === -180) {
      fctx.translate(outW, outH);
      fctx.rotate(Math.PI);
    } else if (angle === 270 || angle === -90) {
      fctx.translate(0, outH);
      fctx.rotate(3 * Math.PI / 2);
    }
    fctx.drawImage(temp, 0, 0);

    final.toBlob(async blob => {
      const url = await uploadToCloudinary(blob);
      // Save to the CURRENTLY SELECTED FOLDER (same rule as device uploads)
      await addDoc(collection(db, "galleryImages"), { url, folder: activeFolder });
      showGallery();
    }, "image/jpeg", 0.92);

    stopCamera();
  };

  camPopup.querySelector("#closeCamBtn").onclick = stopCamera;

  // Switch camera
  camPopup.querySelector("#switchCamBtn").onclick = async () => {
    usingFront = !usingFront;
    await startCamera();
  };
});

// Cloudinary upload
async function uploadToCloudinary(file) {
  const formData = new FormData();

  
  formData.append("file", file);
  formData.append("upload_preset", "unsigned_upload");
  formData.append("folder", "gallery");
  const res = await fetch("https://api.cloudinary.com/v1_1/dzsoan16b/upload", { method: "POST", body: formData });
  const data = await res.json();
  return data.secure_url;
}

  if (!user) window.location.href = "login.html";
  await ensureCameraFolder();
  await loadFolders();
});

// Show fullscreen on image click
galleryList.addEventListener("click", e => {
  const img = e.target.closest("img");
  if (img && img.parentElement.classList.contains("galleryItem")) {
    fullscreenImg.src = img.src;
    fullscreenOverlay.style.display = "flex";
  }
});

// Hide fullscreen on close button or overlay click
closeFullscreenBtn.onclick = () => {
  fullscreenOverlay.style.display = "none";
  fullscreenImg.src = "";
};
fullscreenOverlay.onclick = e => {
  if (e.target === fullscreenOverlay) {
    fullscreenOverlay.style.display = "none";
    fullscreenImg.src = "";
  }
};
// Swipe detection
let startX = 0;
let endX = 0;

fullscreenOverlay.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

fullscreenOverlay.addEventListener("touchend", e => {
  endX = e.changedTouches[0].clientX;
  handleSwipe();
});

function handleSwipe() {
  if (endX - startX > 50) {
    // Swipe right → previous image
    currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
    showFullscreenImage();
  } else if (startX - endX > 50) {
    // Swipe left → next image
    currentIndex = (currentIndex + 1) % currentImages.length;
    showFullscreenImage();
  }
}

// Arrow key support (desktop)
document.addEventListener("keydown", e => {
  if (fullscreenOverlay.style.display === "flex") {
    if (e.key === "ArrowLeft") {
      currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
      showFullscreenImage();
    }
    if (e.key === "ArrowRight") {
      currentIndex = (currentIndex + 1) % currentImages.length;
      showFullscreenImage();
    }
  }
});
